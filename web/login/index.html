<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Orographic Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=Cormorant+Garamond:wght@400;500;600;700&family=Marcellus+SC&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="portal-page login-page">
    <div class="scene-bloom scene-bloom-left" aria-hidden="true"></div>
    <div class="scene-bloom scene-bloom-right" aria-hidden="true"></div>
    <div class="noise"></div>
    <main class="portal-shell">
      <section class="panel portal-card">
        <div class="portal-crest" aria-hidden="true">
          <div class="portal-crest-core">ORO</div>
        </div>
        <p class="eyebrow">Harbor Gate</p>
        <h1>Enter Orographic</h1>
        <p class="subhead">Present your credentials to step onto the San Diego sunset quest board.</p>
        <form id="login-form" class="portal-form">
          <label class="field">
            <span>Username</span>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Username" required />
          </label>
          <label class="field">
            <span>Password</span>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              placeholder="Password"
              required
            />
          </label>
          <button type="submit" class="primary-action">Enter Arena</button>
        </form>
        <div id="error" class="error"></div>
        <p class="portal-footnote muted">Access remains role-gated exactly as before. This is a visual overhaul only.</p>
      </section>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const next = params.get("next") || "/";
      const form = document.getElementById("login-form");
      const errorNode = document.getElementById("error");
      const submitButton = form.querySelector('button[type="submit"]');

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorNode.textContent = "";
        submitButton.disabled = true;
        submitButton.textContent = "Entering...";
        const payload = {
          username: document.getElementById("username").value,
          password: document.getElementById("password").value,
          next,
        };
        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });

          const contentType = response.headers.get("content-type") || "";
          const data = contentType.includes("application/json")
            ? await response.json()
            : { ok: false, error: await response.text() };

          if (!response.ok || !data.ok) {
            errorNode.textContent = data.error || "Login failed";
            return;
          }

          window.location.assign(data.redirectTo || "/");
        } catch (error) {
          errorNode.textContent = error.message || "Login failed";
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Enter Arena";
        }
      });
    </script>
  </body>
</html>
