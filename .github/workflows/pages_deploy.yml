name: Deploy Orographic Pages

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/pages_deploy.yml"
      - "functions/**"
      - "web/**"
      - "wrangler.toml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Skip when Cloudflare deploy secrets are missing
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID == '' || env.CLOUDFLARE_API_TOKEN == '' }}
        run: |
          echo "Cloudflare deploy secrets are not configured."
          echo "Use either Cloudflare Pages Git integration or add CLOUDFLARE_ACCOUNT_ID and CLOUDFLARE_API_TOKEN secrets."

      - name: Set up Node
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          npx wrangler pages deploy web \
            --project-name orographic \
            --branch "${GITHUB_REF_NAME}" \
            --commit-hash "${GITHUB_SHA}" \
            --commit-message "${GITHUB_SHA}"
