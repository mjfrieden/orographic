name: Orographic Scan

on:
  workflow_dispatch:
  schedule:
    # 14:07, 17:07, and 20:07 UTC on weekdays.
    # This is 9:07 AM, 12:07 PM, and 3:07 PM in America/Chicago during daylight saving time.
    - cron: "7 14,17,20 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      OROGRAPHIC_INTERNAL_CAPTURE_TOKEN: ${{ secrets.OROGRAPHIC_INTERNAL_CAPTURE_TOKEN }}
      OROGRAPHIC_SENTINEL_URL: ${{ secrets.OROGRAPHIC_SENTINEL_URL }}
      OROGRAPHIC_SITE_URL: https://orographic.pages.dev
      PYTHONPATH: engine
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Run Orographic scan
        run: |
          python engine/run_scan.py --output web/data/latest_run.json

      - name: Commit refreshed snapshot
        id: snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data/latest_run.json web/data/diagnostics/
          if git diff --cached --quiet; then
            echo "snapshot_changed=false" >> "$GITHUB_OUTPUT"
            echo "No snapshot changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh Orographic snapshot"
          git push
          echo "snapshot_changed=true" >> "$GITHUB_OUTPUT"

      - name: Set up Node
        if: ${{ steps.snapshot.outputs.snapshot_changed == 'true' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Deploy refreshed snapshot to Cloudflare Pages
        if: ${{ steps.snapshot.outputs.snapshot_changed == 'true' && env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          npx wrangler pages deploy web \
            --project-name orographic \
            --branch "${GITHUB_REF_NAME}" \
            --commit-hash "$(git rev-parse HEAD)" \
            --commit-message "snapshot refresh (${GITHUB_REF_NAME})"

      - name: Capture hosted position snapshot
        if: ${{ env.OROGRAPHIC_INTERNAL_CAPTURE_TOKEN != '' }}
        run: |
          RUN_GENERATED_AT_UTC="$(python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('web/data/latest_run.json').read_text(encoding='utf-8'))
          print(payload.get('generated_at_utc', ''))
          PY
          )"
          export RUN_GENERATED_AT_UTC
          python - <<'PY' > /tmp/orographic-position-capture.json
          import json
          import os
          print(json.dumps({
              "run_generated_at_utc": os.environ.get("RUN_GENERATED_AT_UTC", ""),
              "source": "github_actions_orographic_scan",
          }))
          PY
          curl --fail --show-error --silent \
            --request POST \
            --url "${OROGRAPHIC_SITE_URL}/api/internal/positions/capture" \
            --header "Authorization: Bearer ${OROGRAPHIC_INTERNAL_CAPTURE_TOKEN}" \
            --header "Content-Type: application/json" \
            --data @/tmp/orographic-position-capture.json
